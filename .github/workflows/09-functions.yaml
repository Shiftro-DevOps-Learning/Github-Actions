name: 09 - Using Fucntions
on:
  pull_request:
  workflow_dispatch:
jobs:
  echo1:
    runs-on: ubuntu-latest
    steps:
      - name: "Print PR title"
        run : |
          echo "${{ github.envent.pull_request.title }}"
      - name: "Print PR labels"
        run: |
          cat << EOF
          ${{ toJSON(github.event.pull_request.labels) }}
          EOF
      - name: "Bug Step"
        if: ${{ failure() && !cancelled() && contains(github.event.pull_request.lables.*.name, 'fix') }}
        run: |
          echo "I am a bug fix"
      - name: Sleep for 20 seconds"
        run: |
          sleep 20
      - name: "Failing step"
        run: |
          exit 1
      - name: "I will be skipped"
        if: ${{ success() }}
        run: |
          echo "This step will be skipped because the previous step failed"
      - name: "I will execute"
        if: ${{ failure() }}
        run: | 
          echo "I will print if any previous step fails"
      - name: "I will execute"
        if: ${{ !cancelled() }}
        run: | 
          echo "I will always print, except when the workflow is cancelled"
      - name: "I will execute when cancelled"
        if: ${{ cancelled() }}
        run: | 
          echo "I will print only when the workflow is cancelled"
      
      