name: 12 - Working with Outputs
on:
  workflow_dispatch:
    inputs:
      build-status:
        type: choice
        options:
          - success
          - failure
        default: success
        description: "Whether the build should succeed or fail"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ steps.build.outputs.status }}
      output1: ${{ steps.build.outputs.output1 }}
    steps:
      - id: path
        name: Print GITHUB_OUTPUT path
        run: |
          echo "GITHUB_OUTPUT is located at: $GITHUB_OUTPUT"
      
      - id: build
        name: Build
        run: |
          echo "status=${{ inputs.build-status }}, output1=value1, output2=value2" >> "$GITHUB_OUTPUT"
          cat $GITHUB_OUTPUT
          echo "mistake=true" > "$GITHUB_OUTPUT"
          cat $GITHUB_OUTPUT
    
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.outputs.build-status == 'success' }}
    steps:
      - name: Deploy
        run: echo "Deploying application..."
      - name: Print Outputs
        run: | 
          echo "Value of output1: ${{ needs.build.outputs.output1 }}"